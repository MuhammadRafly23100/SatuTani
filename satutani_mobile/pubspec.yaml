name: satutani_mobile
description: "SatuTani - Direct Farm to Consumer Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.1

  # Local Storage
  shared_preferences: ^2.2.3

  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  smooth_page_indicator: ^1.1.0
  fl_chart: ^0.69.0

  # Utils
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8
  webview_flutter_android: ^4.10.13
  webview_flutter: ^4.13.1
  webview_flutter_web: ^0.2.3+4
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_green.png"
  min_sdk_size: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
